# Vitocal profile — heat pump specific DIDs
# Merges on top of common.yaml (vitocal entries win)
schema_version: 1

devices:
  outdoor:
    name: "Vitocal 250-A Outdoor Unit"
    model: "Vitocal 250-A"
  indoor:
    name: "Vitocal 252-A Indoor Unit"
    model: "Vitocal 252-A"
  tank:
    name: "Vitocell 100-E Hot Water Tank"
    model: "Vitocell 100-E"
  mixer:
    name: "Vitocal 252-A Heating Circuit Mixer"
    model: "Vitocal 252-A"
  heater:
    name: "Vitocal 252-A Auxiliary Heater"
    model: "Vitocal 252-A"
  energy:
    name: "Energy Management"
    model: "PV/Grid"

datapoints:
  # --- Override common devices for Vitocal-specific grouping ---
  268:
    type: "temperature_sensor"
    name: "Flow Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  269:
    type: "temperature_sensor"
    name: "Return Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  274:
    type: "temperature_sensor"
    name: "Outside Temperature"
    device: "outdoor"
    subs:
      Actual: { suffix: "current" }

  318:
    type: "pressure_sensor"
    name: "Water Pressure"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  381:
    type: "pump_sensor"
    name: "Internal Pump"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  1043:
    type: "generic_sensor"
    name: "Volume Flow"
    device: "indoor"
    icon: "mdi:water-pump"
    unit_of_measurement: "l/h"
    state_class: "measurement"
    subs:
      Actual: { suffix: "current" }

  271:
    type: "temperature_sensor"
    name: "Hot Water"
    device: "tank"
    subs:
      Actual: { suffix: "" }

  396:
    type: "temperature_setpoint"
    name: "DHW Setpoint"
    device: "tank"
    min: 10
    max: 65
    step: 0.5
    writable: true
    write_mode: "write"

  535:
    type: "energy_sensor"
    name: "Electrical Energy Statistics"
    device: "indoor"
    subs:
      GridSuppliedEnergy: { }
      ProducedEnergy: { }
      GridFeedInEnergy: { }

  377:
    type: "device_info"
    name: "Device Identification"
    device: "indoor"
    extract_serial: true

  875:
    type: "generic_sensor"
    name: "Legionella Protection Activation Time"
    device: "indoor"
    icon: "mdi:shield-bug"

  1710:
    type: "button_action"
    name: "DHW One-Time Charge"
    device: "tank"
    writable: true
    payload_press: "PRESS"
    command_template: >
      {% set cmd = {'mode': 'write', 'data': [[1710, 1]]} %}
      {{ cmd | to_json }}

  1006:
    type: "switch_toggle"
    name: "Quick Mode"
    device: "indoor"
    writable: true
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    command_template: >
      {% set cmd = {'mode': 'write', 'data': [[1006, value]]} %}
      {{ cmd | to_json }}

  # --- Mixer circuit flow temperatures ---
  284:  # MixerOneCircuitFlowTemperatureSensor
    type: "temperature_sensor"
    name: "Circuit 1 Flow Temperature"
    device: "mixer"
    subs:
      Actual: { suffix: "current" }

  286:  # MixerTwoCircuitFlowTemperatureSensor
    type: "temperature_sensor"
    name: "Circuit 2 Flow Temperature"
    device: "mixer"
    subs:
      Actual: { suffix: "current" }

  3016:  # HeatingBufferTemperatureSensor
    type: "temperature_sensor"
    name: "Heating Buffer Temperature"
    device: "tank"
    subs:
      Actual: { suffix: "" }

  # --- Power and thermal capacity ---
  2496:  # CurrentThermalCapacitySystem (W)
    type: "power_sensor"
    name: "Thermal Power (System)"
    device: "indoor"

  2488:  # CurrentElectricalPowerConsumptionSystem
    type: "power_sensor"
    name: "Power Consumption (System)"
    device: "indoor"

  1603:  # PointOfCommonCouplingPower
    type: "power_sensor"
    name: "Grid Active Power"
    device: "energy"
    subs:
      ActivePower: { suffix: "current" }

  # --- DHW Operation State + water_heater ---
  531:  # DomesticHotWaterOperationState
    type: "generic_sensor"
    name: "DHW Operation Mode"
    device: "tank"
    icon: "mdi:water-boiler"
    water_heater:
      name: "Hot Water"
      trigger_did: 531
      current_temperature_did: 271
      current_temperature_did_name: "DomesticHotWaterSensor"
      current_temperature_sub: "Actual"
      temperature_did: 396
      temperature_did_name: "DomesticHotWaterTemperatureSetpoint"
      modes: ["off", "eco", "performance"]
      mode_state_template: >
        {% set m = value | int(0) %}
        {% if m == 0 %}off{% elif m == 1 %}eco{% else %}performance{% endif %}
      mode_command_template: >
        {% set values = {'off': '0000', 'eco': '0100', 'performance': '0200'} %}
        {% set cmd = {'mode': 'write-raw', 'data': [[531, values[value]]]} %}
        {{ cmd | to_json }}
      temperature_command_template: >
        {% set cmd = {'mode': 'write', 'data': [[396, value | float]]} %}
        {{ cmd | to_json }}
      min_temp: 10
      max_temp: 60
      precision: 0.5
      temperature_unit: "C"

  # --- Heat pump specific ---
  2442:  # HeatPumpFrostProtection
    type: "binary_onoff"
    name: "Heat Pump Frost Protection"
    device: "outdoor"
    payload_off: "0"
    payload_on: "1"

  401:  # MixerOneCircuitPump
    type: "binary_onoff"
    name: "Circuit 1 Pump"
    device: "mixer"
    icon: "mdi:pump"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "PowerState"

  402:  # MixerTwoCircuitPump
    type: "binary_onoff"
    name: "Circuit 2 Pump"
    device: "mixer"
    icon: "mdi:pump"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "PowerState"

  1775:  # PrimaryCircuitFanOne
    type: "pump_sensor"
    name: "Primary Circuit Fan 1"
    device: "outdoor"

  1776:  # PrimaryCircuitFanTwo
    type: "pump_sensor"
    name: "Primary Circuit Fan 2"
    device: "outdoor"

  # --- Writable number (safety validated) ---
  2626:  # MaximumPowerElectricalHeater (W)
    type: "power_sensor"
    name: "Max Power Electric Heater"
    device: "heater"
    writable: true
    min: 0
    max: 8000
    step: 100
    command_template: >
      {% set intvalue = value | int %}
      {% if intvalue > 0 and intvalue < 4000 %}
      {% else %}
      {% set cmddata = '%02x' % (intvalue % 256) + '%02x' % (intvalue // 256) + '0000' %}
      {% set cmd = {'mode': 'write-raw', 'data': [[2626, cmddata]]} %}
      {{ cmd | to_json }}
      {% endif %}

  # --- Binary sensors ---
  2855:
    type: "binary_onoff"
    name: "Circuit 1 Frost Protection"
    device: "mixer"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "State"

  2856:
    type: "binary_onoff"
    name: "Circuit 2 Frost Protection"
    device: "mixer"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "State"

  2351:  # HeatPumpCompressor
    type: "binary_onoff"
    name: "Compressor Status"
    device: "outdoor"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "PowerState"

  2352:  # AdditionalElectricHeater
    type: "binary_onoff"
    name: "Additional Heater Status"
    device: "heater"
    payload_off: "0"
    payload_on: "1"
    trigger_sub: "PowerState"

  # --- Statistics ---
  2369:  # HeatPumpCompressorStatistical
    type: "generic_sensor"
    name: "Compressor Statistics"
    device: "outdoor"
    subs:
      hours:
        unit_of_measurement: "h"
        icon: "mdi:clock-outline"
        state_class: "total_increasing"
      starts:
        icon: "mdi:counter"
        state_class: "total_increasing"

  2370:  # AdditionalElectricHeaterStatistical
    type: "generic_sensor"
    name: "Additional Heater Statistics"
    device: "heater"
    subs:
      hours:
        unit_of_measurement: "h"
        icon: "mdi:clock-outline"
        state_class: "total_increasing"
      starts:
        icon: "mdi:counter"
        state_class: "total_increasing"

  # --- Temperature sensors ---
  1770:  # SecondaryOutletTemperatureSensor
    type: "temperature_sensor"
    name: "Secondary Circuit Supply Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  1771:  # EngineRoomTemperatureSensor
    type: "temperature_sensor"
    name: "Boiler Room Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  2333:  # EconomizerLiquidTemperatureSensor
    type: "temperature_sensor"
    name: "Condenser Liquid Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  2334:  # EvaporatorVaporTemperatureSensor
    type: "temperature_sensor"
    name: "Evaporator Vapor Temperature"
    device: "outdoor"
    subs:
      Actual: { suffix: "current" }

  354:  # PrimaryHeatExchanger
    type: "temperature_sensor"
    name: "Primary Heat Exchanger Temperature"
    device: "indoor"
    subs:
      Actual: { suffix: "current" }

  # --- Status DIDs ---
  2350:  # EnergyManagmentSystemResultingControlState
    type: "generic_sensor"
    name: "Smart Grid Operating State"
    device: "indoor"
    icon: "mdi:home-variant"
    value_template: >
      {% set ostate = int(value) %}
      {% if ostate==1 %}
        {{ "Shutdown" }}
      {% elif ostate==2 %}
        {{ "Normal operation" }}
      {% elif ostate==3 %}
        {{ "Preferred operation" }}
      {% elif ostate==4 %}
        {{ "Forced operation" }}
      {% else %}
        {{ value }}
      {% endif %}

  2335:  # FourWayValve
    type: "generic_sensor"
    name: "Four-Way Valve"
    device: "indoor"
    icon: "mdi:valve"
    value_template: >
      {% set state = value | int %}
      {% if state == 0 %}Heating
      {% elif state == 1 %}Defrost
      {% elif state == 2 %}DHW
      {% elif state == 3 %}Cooling
      {% else %}{{ value }}{% endif %}

  2346:  # CompressorSpeed (%)
    type: "pump_sensor"
    name: "Compressor Speed"
    device: "outdoor"

  2569:  # CompressorSpeedRPS
    type: "generic_sensor"
    name: "Compressor Speed (rps)"
    device: "outdoor"
    unit_of_measurement: "rps"
    state_class: "measurement"

  # --- PV ---
  1690:
    type: "generic_sensor"
    name: "PV Status"
    device: "energy"
    icon: "mdi:solar-power"

  1834:
    type: "power_sensor"
    name: "PV Power Generation"
    device: "energy"
    icon: "mdi:solar-power"

  # --- Room temperature setpoints ---
  424:  # MixerOneCircuitRoomTemperatureSetpoint
    type: "temperature_sensor"
    name: "Circuit 1 Room Setpoint"
    device: "mixer"
    subs:
      Comfort:
        suffix: ""
        icon: "mdi:thermometer-plus"
      Standard:
        suffix: ""
        icon: "mdi:thermometer"
      Reduced:
        suffix: ""
        icon: "mdi:thermometer-minus"

  426:  # MixerTwoCircuitRoomTemperatureSetpoint
    type: "temperature_sensor"
    name: "Circuit 2 Room Setpoint"
    device: "mixer"
    subs:
      Comfort:
        suffix: ""
        icon: "mdi:thermometer-plus"
      Standard:
        suffix: ""
        icon: "mdi:thermometer"
      Reduced:
        suffix: ""
        icon: "mdi:thermometer-minus"

  # --- Heating circuit operation modes (extended for heat pumps) ---
  # OpModes: 0=Off, 1=Heating, 5=Cooling, 255=Automatic
  # NEEDS-VERIFY: Cooling mode (5) untested on Vitocal 250-A hardware
  1415:  # MixerOneCircuitOperationState
    type: "select_mode"
    name: "Circuit 1 Operation Mode"
    device: "mixer"
    subs:
      Mode/ID:
        entity_type: "select"
        options: ["off", "heat", "cool", "auto"]
        value_template: >
          {% set m = value | int(0) %}
          {% if m == 0 %}off{% elif m == 1 %}heat{% elif m == 5 %}cool{% elif m == 255 %}auto{% else %}auto{% endif %}
        command_template: >
          {% set values = {'off':'0000', 'heat':'0100', 'cool':'0500', 'auto':'ff00'} %}
          {% set cmd = {'mode': 'write-raw', 'data':[[1415, values[value]]]} %}
          {{ cmd | to_json }}
    climate:
      name: "Heating Circuit 1"
      trigger_sub: "Mode/ID"
      modes: ["off", "heat", "cool", "auto"]
      mode_state_template: >
        {% set m = value_json | int(0) %}
        {% if m == 0 %}off{% elif m == 1 %}heat{% elif m == 5 %}cool{% elif m == 255 %}auto{% else %}auto{% endif %}
      mode_command_template: >
        {% set values = {'off':'0000', 'heat':'0100', 'cool':'0500', 'auto':'ff00'} %}
        {% set cmd = {'mode': 'write-raw', 'data':[[1415, values[value]]]} %}
        {{ cmd | to_json }}
      temperature_did: 1643
      temperature_did_name: "MixerOneCircuitCurrentTemperatureSetpoint"
      min_temp: 3
      max_temp: 37
      precision: 1.0
      temperature_unit: "C"
      temperature_command_template: >
        {% set value_target = (value*10) | int %}
        {% set hk1_bp = states('sensor.1415_mixeronecircuitoperationstate') %}
        {% if (hk1_bp=="Komfort") %}
        {% set value_com = min(max(30, value_target),370) %}
        {% set value_sta = min(max(30, value_target-20),370) %}
        {% set value_red = min(max(30, value_target-40),370) %}
        {% elif (hk1_bp=="Reduziert") or (hk1_bp=="Frostschutz") or (hk1_bp=="Abschaltbetrieb") %}
        {% set value_com = min(max(30, value_target+40),370) %}
        {% set value_sta = min(max(30, value_target+20),370) %}
        {% set value_red = min(max(30, value_target),370) %}
        {% else %}
        {% set value_com = min(max(30, value_target+20),370) %}
        {% set value_sta = min(max(30, value_target),370) %}
        {% set value_red = min(max(30, value_target-20),370) %}
        {% endif %}
        {% set cmddata = '%02x' % (value_com % 256) + '%02x' % (value_com // 256) + '%02x' % (value_sta % 256) + '%02x' % (value_sta // 256) + '%02x' % (value_red % 256) + '%02x' % (value_red // 256) + '000000' %}
        {% set cmd = {'mode': 'write-raw', 'data':[[424, cmddata]]} %}
        {{ cmd | to_json }}

  1416:  # MixerTwoCircuitOperationState
    type: "select_mode"
    name: "Circuit 2 Operation Mode"
    device: "mixer"
    subs:
      Mode/ID:
        entity_type: "select"
        options: ["off", "heat", "cool", "auto"]
        value_template: >
          {% set m = value | int(0) %}
          {% if m == 0 %}off{% elif m == 1 %}heat{% elif m == 5 %}cool{% elif m == 255 %}auto{% else %}auto{% endif %}
        command_template: >
          {% set values = {'off':'0000', 'heat':'0100', 'cool':'0500', 'auto':'ff00'} %}
          {% set cmd = {'mode': 'write-raw', 'data':[[1416, values[value]]]} %}
          {{ cmd | to_json }}
    climate:
      name: "Heating Circuit 2"
      trigger_sub: "Mode/ID"
      modes: ["off", "heat", "cool", "auto"]
      mode_state_template: >
        {% set m = value_json | int(0) %}
        {% if m == 0 %}off{% elif m == 1 %}heat{% elif m == 5 %}cool{% elif m == 255 %}auto{% else %}auto{% endif %}
      mode_command_template: >
        {% set values = {'off':'0000', 'heat':'0100', 'cool':'0500', 'auto':'ff00'} %}
        {% set cmd = {'mode': 'write-raw', 'data':[[1416, values[value]]]} %}
        {{ cmd | to_json }}
      temperature_did: 1644
      temperature_did_name: "MixerTwoCircuitCurrentTemperatureSetpoint"
      min_temp: 3
      max_temp: 37
      precision: 1.0
      temperature_unit: "C"
      temperature_command_template: >
        {% set value_target = (value*10) | int %}
        {% set hk2_bp = states('sensor.1416_mixertwocircuitoperationstate') %}
        {% if (hk2_bp=="Komfort") %}
        {% set value_com = min(max(30, value_target),370) %}
        {% set value_sta = min(max(30, value_target-20),370) %}
        {% set value_red = min(max(30, value_target-40),370) %}
        {% elif (hk2_bp=="Reduziert") or (hk2_bp=="Frostschutz") or (hk2_bp=="Abschaltbetrieb") %}
        {% set value_com = min(max(30, value_target+40),370) %}
        {% set value_sta = min(max(30, value_target+20),370) %}
        {% set value_red = min(max(30, value_target),370) %}
        {% else %}
        {% set value_com = min(max(30, value_target+20),370) %}
        {% set value_sta = min(max(30, value_target),370) %}
        {% set value_red = min(max(30, value_target-20),370) %}
        {% endif %}
        {% set cmddata = '%02x' % (value_com % 256) + '%02x' % (value_com // 256) + '%02x' % (value_sta % 256) + '%02x' % (value_sta // 256) + '%02x' % (value_red % 256) + '%02x' % (value_red // 256) + '000000' %}
        {% set cmd = {'mode': 'write-raw', 'data':[[426, cmddata]]} %}
        {{ cmd | to_json }}

  # --- Heating curve eco limits (Phase 2.3) ---
  # Read-only: full heating curve is a complex multi-DID calculation,
  # these show the eco-mode boundaries
  2426:  # EcoHeatingLimitTemperature
    type: "temperature_sensor"
    name: "Eco Heating Limit"
    device: "indoor"
    subs:
      Actual: { suffix: "" }

  2427:  # EcoCoolingLimitTemperature
    type: "temperature_sensor"
    name: "Eco Cooling Limit"
    device: "indoor"
    subs:
      Actual: { suffix: "" }

  # --- Pump setpoints ---
  1102:  # MixerOneCircuitPumpMinimumMaximumLimit
    type: "pump_sensor"
    name: "Circuit 1 Pump"
    device: "mixer"
    subs:
      Setpoint:
        entity_type: "number"
        writable: true
        min: 20
        max: 100
        step: 5
        unit_of_measurement: "%"
        icon: "mdi:pump"
        command_template: >
          {% set intvalue = value | int %}
          {% set cmddata = '14' + '%02x' % intvalue + '%02x' % intvalue %}
          {% set cmd = {'mode': 'write-raw', 'data': [[1102, cmddata]]} %}
          {{ cmd | to_json }}

  1192:  # MixerOneCircuitFlowTemperatureMinimumMaximumLimit
    type: "temperature_setpoint"
    name: "Circuit 1 Flow Temperature"
    device: "mixer"
    subs:
      Minimum:
        entity_type: "number"
        writable: true
        min: 10
        max: 60
        step: 1
        unit_of_measurement: "°C"
        icon: "mdi:thermometer"
        command_template: >
          {% set flowmax = min(max(states('sensor.1192_mixeronecircuitflowtemperature_maximum') | int * 10,100),600) %}
          {% set flowmin = min(max(value*10 | int, 100), flowmax) %}
          {% set cmddata = '%02x' % (flowmin % 256) + '%02x' % (flowmin // 256) + '%02x' % (flowmax % 256) + '%02x' % (flowmax // 256) + '000000000000' %}
          {% set cmd = {'mode': 'write-raw', 'data': [[1192, cmddata]]} %}
          {{ cmd | to_json }}

      Maximum:
        entity_type: "number"
        writable: true
        min: 10
        max: 60
        step: 1
        unit_of_measurement: "°C"
        icon: "mdi:thermometer"
        command_template: >
          {% set flowmin = min(max(states('sensor.1192_mixeronecircuitflowtemperature_minimum') | int * 10,100),600) %}
          {% set flowmax = min(max(value*10 | int, flowmin), 600) %}
          {% set cmddata = '%02x' % (flowmin % 256) + '%02x' % (flowmin // 256) + '%02x' % (flowmax % 256) + '%02x' % (flowmax // 256) + '000000000000' %}
          {% set cmd = {'mode': 'write-raw', 'data': [[1192, cmddata]]} %}
          {{ cmd | to_json }}

  1103:  # MixerTwoCircuitPumpMinimumMaximumLimit
    type: "pump_sensor"
    name: "Circuit 2 Pump"
    device: "mixer"
    subs:
      Setpoint:
        entity_type: "number"
        writable: true
        min: 20
        max: 100
        step: 5
        unit_of_measurement: "%"
        icon: "mdi:pump"
        command_template: >
          {% set intvalue = value | int %}
          {% set cmddata = '1464' + '%02x' % intvalue %}
          {% set cmd = {'mode': 'write-raw', 'data': [[1103, cmddata]]} %}
          {{ cmd | to_json }}
