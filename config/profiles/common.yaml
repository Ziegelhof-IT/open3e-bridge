  # --- Holiday mode (Phase 2.2) ---
  # DID 511/512 use RawCodec(8) — 8 bytes, internal structure undocumented.
  # Likely start+end date range. Exposed as raw hex sensor for visibility.
  # Write support requires reverse-engineering the date format.
  511:  # HolidayPhase
    type: "generic_sensor"
    name: "Holiday Mode"
    device: "system"
    icon: "mdi:beach"

  512:  # HolidayAtHomePhase
    type: "generic_sensor"
    name: "Holiday At Home Mode"
    device: "system"
    icon: "mdi:home-account"

  # --- Heating circuit operation modes (base: off/auto) ---
  # Overridden in vitocal.yaml with heat/cool modes
  1415:  # MixerOneCircuitOperationState
    type: "select_mode"
    name: "Circuit 1 Operation Mode"
    device: "circuit"
    subs:
      Mode/ID:
        entity_type: "select"
        options: ["off", "auto"]
        value_template: "{{ 'off' if (value | int(0)) == 0 else 'auto' }}"
        command_template: >
          {% set values = { 'auto':'ff00', 'off':'0000'} %}
          {% set cmd = {'mode': 'write-raw', 'data':[[1415, values[value]]]} %}
          {{ cmd | to_json }}

  1416:  # MixerTwoCircuitOperationState
    type: "select_mode"
    name: "Circuit 2 Operation Mode"
    device: "circuit"
    subs:
      Mode/ID:
        entity_type: "select"
        options: ["off", "auto"]
        value_template: "{{ 'off' if (value | int(0)) == 0 else 'auto' }}"
        command_template: >
          {% set values = { 'auto':'ff00', 'off':'0000'} %}
          {% set cmd = {'mode': 'write-raw', 'data':[[1416, values[value]]]} %}
          {{ cmd | to_json }}

# Device identification (priority: first found is used)
device_identification_dids:
  377:
    type: "device_info"
    name: "Device Identification"
    extract_model: true
  256:
    type: "device_info"
    name: "Device Property"

# Device mapping based on found strings
device_patterns:
  - pattern: "250"
    name: "Vitocal 250-A"
    model: "Vitocal 250-A"
  - pattern: "252"
    name: "Vitocal 252-A"
    model: "Vitocal 252-A"
  - pattern: "VX3"
    name: "Viessmann VX3"
    model: "VX3"
  - pattern: "VDENS"
    name: "Viessmann Vitodens"
    model: "Vitodens"
  - pattern: "aroTHERM"
    name: "Vaillant aroTHERM"
    model: "aroTHERM"
  - pattern: "ecoTEC"
    name: "Vaillant ecoTEC"
    model: "ecoTEC"

# Fallback if no device info found
default_device:
  name: "Open3E System"
  model: "E3 Controller"

# Write-blacklisted DIDs (read allowed, write blocked in discovery)
write_blacklisted_dids:
  - 875  # LegionellaProtectionActivationTime - safety-critical, read-only

# Faulty DIDs (ignored)
ignored_dids:
  - 540  # Device rejected read access
