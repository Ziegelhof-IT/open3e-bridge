# Common profile — DIDs present on all E3 devices
# Loaded as base, then device-specific profile merges on top
schema_version: 1

devices:
  system:
    name: "Open3E System"
    model: "E3 Controller"
  dhw:
    name: "Domestic Hot Water"
    model: "DHW"
  circuit:
    name: "Heating Circuit"
    model: "Heating Circuit"

datapoints:
  # --- Temperature sensors ---
  268:  # FlowTemperatureSensor
    type: "temperature_sensor"
    name: "Flow Temperature"
    device: "system"
    subs:
      Actual: { suffix: "current" }

  269:  # ReturnTemperatureSensor
    type: "temperature_sensor"
    name: "Return Temperature"
    device: "system"
    subs:
      Actual: { suffix: "current" }

  274:  # OutsideTemperatureSensor
    type: "temperature_sensor"
    name: "Outside Temperature"
    device: "system"
    subs:
      Actual: { suffix: "current" }

  318:  # WaterPressureSensor
    type: "pressure_sensor"
    name: "Water Pressure"
    device: "system"
    subs:
      Actual: { suffix: "current" }

  # --- Pump and flow ---
  381:  # CentralHeatingPump
    type: "pump_sensor"
    name: "Internal Pump"
    device: "system"
    subs:
      Actual: { suffix: "current" }

  1043:  # AllengraSensor (Volume Flow)
    type: "generic_sensor"
    name: "Volume Flow"
    device: "system"
    icon: "mdi:water-pump"
    unit_of_measurement: "l/h"
    state_class: "measurement"
    subs:
      Actual: { suffix: "current" }

  # --- Domestic hot water ---
  271:  # DomesticHotWaterSensor
    type: "temperature_sensor"
    name: "Hot Water"
    device: "dhw"
    subs:
      Actual: { suffix: "" }

  396:  # DomesticHotWaterTemperatureSetpoint
    type: "temperature_setpoint"
    name: "DHW Setpoint"
    device: "dhw"
    min: 10
    max: 65
    step: 0.5
    writable: true
    write_mode: "write"

  # --- Energy ---
  535:  # ObjectElectricalEnergyStatistical
    type: "energy_sensor"
    name: "Electrical Energy Statistics"
    device: "system"
    subs:
      GridSuppliedEnergy: { }
      ProducedEnergy: { }
      GridFeedInEnergy: { }

  # --- Device identification ---
  377:  # IdentNumber
    type: "device_info"
    name: "Device Identification"
    device: "system"
    extract_serial: true

  # --- Safety and protection ---
  875:  # LegionellaProtectionActivationTime
    type: "generic_sensor"
    name: "Legionella Protection Activation Time"
    device: "system"
    icon: "mdi:shield-bug"

  # --- DHW controls ---
  1710:  # DomesticHotWaterOneTimeCharge
    type: "button_action"
    name: "DHW One-Time Charge"
    device: "dhw"
    writable: true
    payload_press: "PRESS"
    command_template: >
      {% set cmd = {'mode': 'write', 'data': [[1710, 1]]} %}
      {{ cmd | to_json }}

  1006:  # QuickMode
    type: "switch_toggle"
    name: "Quick Mode"
    device: "system"
    writable: true
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    command_template: >
      {% set cmd = {'mode': 'write', 'data': [[1006, value]]} %}
      {{ cmd | to_json }}

  # --- Error / DTC lists (Phase 1.3) ---
  257:  # StatusDtcList
    type: "error_list"
    name: "Status List"
    device: "system"
    icon: "mdi:alert-circle-outline"
    entity_category: "diagnostic"
    json_attributes_topic: "open3e/680_257_StatusDtcList"
    json_attributes_template: "{{ value }}"
    value_template: >
      {% set data = value_json if value_json is mapping else {} %}
      {% set count = data.get('Count', 0) | int(0) %}
      {% if count == 0 %}No errors{% else %}{{ count }} active{% endif %}

  265:  # ErrorDtcList
    type: "error_list"
    name: "Error List"
    device: "system"
    icon: "mdi:alert-octagon"
    entity_category: "diagnostic"
    json_attributes_topic: "open3e/680_265_ErrorDtcList"
    json_attributes_template: "{{ value }}"
    value_template: >
      {% set data = value_json if value_json is mapping else {} %}
      {% set count = data.get('Count', 0) | int(0) %}
      {% if count == 0 %}No errors{% else %}{{ count }} active{% endif %}

  # --- Schedule DIDs (read-only, Phase 2.1) ---
  # DHW schedules (Monday-Sunday)
  691:
    type: "schedule_sensor"
    name: "DHW Schedule Monday"
    device: "dhw"
    json_attributes_topic: "open3e/680_691_DomesticHotWaterTimeScheduleMonday"
    json_attributes_template: "{{ value }}"
    value_template: >
      {% set data = value_json if value_json is mapping else {} %}
      {% set s = data.get('Schedules', []) %}
      {% if s | length == 0 %}inactive
      {% else %}{{ s[0].get('Start','?') }}-{{ s[0].get('Stop','?') }}{% endif %}
